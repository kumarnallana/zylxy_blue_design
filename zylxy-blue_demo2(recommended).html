    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        background: #f0f4ff;
        font-family: "Inter", "Helvetica Neue", system-ui, sans-serif;
      }
      ::placeholder {
        color: #94a3b8;
      }
      select option {
        color: #0f172a;
      }

      @keyframes marquee {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(-50%);
        }
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes pulse-ring {
        0% {
          transform: scale(0.9);
          opacity: 0.6;
        }
        70% {
          transform: scale(1.15);
          opacity: 0;
        }
        100% {
          transform: scale(1.15);
          opacity: 0;
        }
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-12px);
        }
      }
      @keyframes gridFade {
        from {
          opacity: 0;
        }
        to {
          opacity: 0.4;
        }
      }

      .fade-up {
        animation: fadeUp 0.55s ease forwards;
      }
      input:focus,
      textarea:focus,
      select:focus {
        outline: none;
      }
      button {
        cursor: pointer;
      }

      /* ── Navbar Logo ── */
      .navbar-brand {
        display: flex;
        border-radius: 20px;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        flex-shrink: 0;
        text-decoration: none;
      }
      .navbar-logo {
        height: 46px;
        width: auto;
        object-fit: contain;
        display: block;
        mix-blend-mode: multiply;
        transition: opacity 0.18s;
        flex-shrink: 0;
      }
      .navbar-logo:hover {
        opacity: 0.82;
      }
      .navbar-wordmark {
        display: flex;
        flex-direction: column;
        justify-content: center;
        line-height: 1;
      }
      @media (max-width: 900px) {
        .navbar-logo {
          height: 38px;
        }
        .navbar-wordmark-sub {
          display: none;
        }
      }
      @media (max-width: 520px) {
        .navbar-logo {
          height: 32px;
        }
      }
      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #f0f4ff;
      }
      ::-webkit-scrollbar-thumb {
        background: #93c5fd;
        border-radius: 3px;
      }

      @media (max-width: 900px) {
        .hero-layout {
          flex-direction: column !important;
        }
        .hero-right {
          display: none !important;
        }
        .stats-row {
          grid-template-columns: repeat(2, 1fr) !important;
        }
        .nav-links {
          display: none !important;
        }
        .hero-btns {
          flex-direction: column !important;
          align-items: flex-start !important;
        }
        .services-grid {
          grid-template-columns: 1fr !important;
        }
        .cases-grid {
          grid-template-columns: 1fr !important;
        }
        .testimonials-grid {
          grid-template-columns: 1fr !important;
        }
        .lead-grid {
          grid-template-columns: 1fr !important;
        }
        .footer-grid {
          grid-template-columns: repeat(2, 1fr) !important;
        }
        .section-top {
          flex-direction: column !important;
          align-items: flex-start !important;
        }
        .announcement-bar {
          display: none !important;
        }
      }
      @media (max-width: 520px) {
        .footer-grid {
          grid-template-columns: 1fr !important;
        }
        .stats-row {
          grid-template-columns: 1fr 1fr !important;
        }
      }
    </style>

      /* ═══════════════ SHARED BUTTONS ═══════════════ */
      function BlueBtn({ label, small, onClick, outline, dark }) {

              onMouseEnter={() => setH(true)}
              onMouseLeave={() => setH(false)}
              style={{

      /* ═══════════════ NAVBAR ═══════════════ */
      function Navbar() {
        const [dropOpen, setDropOpen] = useState(false);
        const [scrolled, setScrolled] = useState(false);
        const dropRef = useRef(null);

        useEffect(() => {
          const fn = () => setScrolled(window.scrollY > 30);
          window.addEventListener("scroll", fn);
          return () => window.removeEventListener("scroll", fn);
        }, []);

        useEffect(() => {
          const fn = (e) => {
            if (dropRef.current && !dropRef.current.contains(e.target))
              setDropOpen(false);
          };
          document.addEventListener("mousedown", fn);
          return () => document.removeEventListener("mousedown", fn);
        }, []);

        return (
          <nav
            style={{
              position: "fixed",
              top: "38px",
              left: 0,
              right: 0,
              zIndex: 1000,
              background: scrolled ? "rgba(255,255,255,0.97)" : WHITE,
              borderBottom: `1px solid ${scrolled ? BRD_S : BRD}`,
              backdropFilter: scrolled ? "blur(10px)" : "none",
              transition: "all 0.22s",
              boxShadow: scrolled ? "0 4px 20px rgba(37,99,235,0.08)" : "none",
            }}
          >
            <div
              style={{
                maxWidth: "1200px",
                margin: "0 auto",
                padding: "0 32px",
                height: "60px",
                display: "flex",
                alignItems: "center",
                justifyContent: "space-between",

                  alt="Zylxy Technologies Logo"

                />

                      fontWeight: "800",
                      fontSize: "20px",
                      color: NAVY,
                      letterSpacing: "-0.04em",
                      lineHeight: "1.1",

                    Zylxy

                  <span
                    className="navbar-wordmark-sub"
                    style={{
                      fontFamily: INST,
                      fontSize: "10px",
                      fontWeight: "500",
                      color: TXT3,
                      letterSpacing: "0.05em",
                      marginTop: "1px",
                    }}
                  >
                    Technologies
                  </span>
                </div>
              </div>

              <div
                className="nav-links"
                style={{ display: "flex", alignItems: "center", gap: "4px" }}
              >
                {["Home", "About"].map((l) => (
                  <NavLink key={l} label={l} />
                ))}
                <div ref={dropRef} style={{ position: "relative" }}>
                  <NavDropTrigger
                    open={dropOpen}
                    onClick={() => setDropOpen(!dropOpen)}
                  />
                  {dropOpen && (
                    <ServicesMegaMenu onClose={() => setDropOpen(false)} />
                  )}
                </div>
                <NavLink label="Contact" />
              </div>

              <BlueBtn label="Free Consultation" small />
            </div>
          </nav>
        );
      }
