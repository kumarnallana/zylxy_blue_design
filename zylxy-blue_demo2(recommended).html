      function Navbar() {
        const [dropOpen, setDropOpen] = useState(false);
        const [scrolled, setScrolled] = useState(false);
        const dropRef = useRef(null);

        useEffect(() => {
          const fn = () => setScrolled(window.scrollY > 30);
          window.addEventListener("scroll", fn);
          return () => window.removeEventListener("scroll", fn);
        }, []);

        useEffect(() => {
          const fn = (e) => {
            if (dropRef.current && !dropRef.current.contains(e.target))
              setDropOpen(false);
          };
          document.addEventListener("mousedown", fn);
          return () => document.removeEventListener("mousedown", fn);
        }, []);

          <nav
            style={{
              position: "fixed",
              top: "38px",
              left: 0,

      function NavLink({ label }) {
        const [h, setH] = useState(false);
        return (
          <span
            onMouseEnter={() => setH(true)}
            onMouseLeave={() => setH(false)}
            style={{
              padding: "7px 14px",
              fontSize: "14px",
              fontWeight: "500",
              cursor: "pointer",
              color: h ? BLUE : TXT2,
              fontFamily: INST,
              transition: "color 0.14s",
              borderRadius: "6px",
              background: h ? BLUE_T : "transparent",
              letterSpacing: "0.01em",
              whiteSpace: "nowrap",
            }}
          >
            {label}
          </span>
        );
      }

      function NavDropTrigger({ open, onClick }) {
        const [h, setH] = useState(false);
        return (
          <span
            onClick={onClick}
            onMouseEnter={() => setH(true)}
            onMouseLeave={() => setH(false)}
            style={{
              padding: "7px 14px",
              fontSize: "14px",
              fontWeight: "500",
              cursor: "pointer",
              color: open || h ? BLUE : TXT2,
              fontFamily: INST,
              display: "flex",
              alignItems: "center",
              gap: "4px",
              transition: "color 0.14s",
              userSelect: "none",
              borderRadius: "6px",
              background: open || h ? BLUE_T : "transparent",
